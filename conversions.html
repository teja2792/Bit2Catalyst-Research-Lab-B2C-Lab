<h1>Unit Conversions</h1>

<p>Interactive tools for energy, electrochemistry, and materials science.</p>

<ul>
<li>Energy ↔ Wavelength ↔ Frequency</li>
<li>Electrochemical Potential Conversions</li>
<li>Nernst Equation Calculator (coming soon)</li>
</ul>
<input id="input" type="number" placeholder="Energy (eV)">
<button onclick="convert()">Convert</button>
<p id="output"></p>

<script>
function convert() {
  let e = document.getElementById("input").value;
  let wavelength = 1240 / e;
  document.getElementById("output").innerText =
    "Wavelength (nm): " + wavelength.toFixed(2);
}
</script>
