  <h1>Unit Conversions</h1>

  <p>Interactive Energy ↔ Wavelength ↔ Frequency converter</p>

  <!-- Converter -->
  <div class="card">

    <div class="row"><input id="eV" oninput="convert('eV')"><span>eV</span></div>
    <div class="row"><input id="meV" oninput="convert('meV')"><span>meV</span></div>
    <div class="row"><input id="nm" oninput="convert('nm')"><span>nm</span></div>
    <div class="row"><input id="um" oninput="convert('um')"><span>µm</span></div>
    <div class="row"><input id="cm" oninput="convert('cm')"><span>cm⁻¹</span></div>
    <div class="row"><input id="THz" oninput="convert('THz')"><span>THz</span></div>
    <div class="row"><input id="fs" oninput="convert('fs')"><span>fs</span></div>
    <div class="row"><input id="ps" oninput="convert('ps')"><span>ps</span></div>

  </div>

</div>

<script>
function convert(from) {
  let eV;

  if (from === "eV") eV = val("eV");
  if (from === "meV") eV = val("meV") / 1000;
  if (from === "nm") eV = 1240 / val("nm");
  if (from === "um") eV = 1.24 / val("um");
  if (from === "cm") eV = val("cm") / 8065;
  if (from === "THz") eV = val("THz") * 4.1357;
  if (from === "fs") eV = 4.1357 / val("fs");
  if (from === "ps") eV = 4.1357 / (val("ps") * 1000);

  if (!eV || isNaN(eV)) return;

  set("eV", eV);
  set("meV", eV * 1000);
  set("nm", 1240 / eV);
  set("um", 1.24 / eV);
  set("cm", eV * 8065);
  set("THz", eV / 4.1357);
  set("fs", 4.1357 / eV);
  set("ps", (4.1357 / eV) / 1000);
}

function val(id){ return parseFloat(document.getElementById(id).value); }
function set(id,v){ document.getElementById(id).value = v.toFixed(5); }
</script>
